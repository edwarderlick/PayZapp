<script>
        // Simple micro-interaction for the swap icon
        const swapBtn = document.querySelector('button .material-symbols-outlined:contains("swap_vert")')?.parentElement;
        if (swapBtn) {
            swapBtn.addEventListener('click', () => {
                const inputs = document.querySelectorAll('input');
                const val0 = inputs[0].value;
                inputs[0].value = inputs[1].value;
                inputs[1].value = val0;
            });
        }

        // Custom selector for containing text in Material Symbols since :contains is not native CSS
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            if (icon.textContent.trim() === 'swap_vert') {
                icon.parentElement.addEventListener('click', () => {
                   // Add a temporary animation class
                   icon.classList.add('rotate-180');
                   setTimeout(() => icon.classList.remove('rotate-180'), 500);
                });
            }
        });
    </script>
